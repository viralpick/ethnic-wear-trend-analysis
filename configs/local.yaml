# 로컬 실행용 설정. 절대경로를 쓰고 싶으면 /로 시작하는 값으로 바꾼다.
paths:
  sample_data: sample_data
  outputs: outputs
  # M3.F brand registry — handle/alias → BrandInfo lookup. None 이면 brand 추출 skip.
  brand_registry: data/brand_registry.json

unknown_signals:
  # spec §4.2 — 3일 rolling window에서 count ≥ 10 이면 리뷰 큐로 올림.
  window_days: 3
  threshold: 10

logging:
  level: INFO

# --------------------------------------------------------------------------- #
# M3.E — Raw → Normalized 단계의 파생 분류 규칙
# haul_tags: HASHTAG_TRACKING 중 이 태그가 하나라도 섞이면 HASHTAG_HAUL 로 승격.
# roadmap seed (5) + 4/24 1,139 post 분포 조사 (10) + 4/28 M3.F trend_hashtags
# 자동 추출 (6: *haul$/*finds$/tryon* substring + ethnic_share≥0.6 + n≥3) = 21개.
# 모두 lowercase, `#` 없이. 로더 스키마는 ajio/kurta/ethnic haul 미관측이지만 미래 수집 대비 유지.
# --------------------------------------------------------------------------- #
normalization:
  haul_tags:
    - myntrahaul
    - ajiohaul
    - kurtahaul
    - ethnichaul
    - myntrafinds
    - myntrahauls
    - meeshohaul
    - amazonkurtihaul
    - kurtasethaul
    - haul
    - meeshofinds
    - amazonfinds
    - flipkartfinds
    - budgetfinds
    - whatiorderedvswhatigot
    # 4/28 M3.F 자동 확장 (6)
    - amazonhaul
    - tryonhaul
    - ethnicwearhaul
    - haulvideo
    - festivehaul
    - earringhaul

# --------------------------------------------------------------------------- #
# Step 3-B (scoring / vlm / palette / export / pipeline) 설정
# 아래 값은 1차 구현용 초안. 4/24 싱크에서 실제 3일치 데이터로 캘리브레이션한다.
# 코드에는 magic number 를 두지 않고 전부 여기서 읽는다.
# --------------------------------------------------------------------------- #

pipeline:
  # spec §12 타임라인 — 수집 시작일. data_maturity / weekly_direction / momentum 의
  # bootstrap 윈도우 계산에 사용.
  collection_start_date: 2026-04-21
  # 실행 시각 기준 날짜. None 이면 run_daily_pipeline 이 today 를 쓴다.
  target_date: null
  # StarRocks 로드 모드: count(갯수 기준, 현재 POC) | date(기간 기준, 향후 운영)
  window_mode: count
  # count 모드: 배치당 포스트 수 (posting_at 오름차순 정렬 후 LIMIT/OFFSET)
  page_size: 200
  # date 모드: target_date 기준 N일 이내 포스트 로드
  window_days: 30

scoring:
  # spec §9.1 — 4개 팩터 가중치 합 = 100. 4/24 싱크 주요 튜닝 대상.
  weights:
    social: 40.0
    youtube: 25.0
    cultural: 15.0
    momentum: 20.0

  # 정규화는 active 클러스터 set 에 대한 same-run min-max 로 동결.
  # configs override 가 아니면 다른 방식 (z-score / log / percentile / softmax) 금지.
  normalization_method: minmax_same_run

  # spec §9.3 — ▲▼→ 경계.
  direction_threshold_pct: 5.0

  # spec §9.4 — 라이프사이클 점수 대역.
  lifecycle:
    early_below: 30.0
    growth_until: 65.0
    # growth 자동 트리거용 post_count (이 미만이면 점수와 관계없이 early).
    early_post_count_threshold: 10

  # spec §9.2 Social — 인플루언서 티어 가중치.
  # 2026-04-24 완만화: 기존 3.0/2.0/1.5/1.0 은 mega 가 cluster Social 을 독점하는 경향이 강해
  # micro 가 다수 포스트로 올려놓은 cluster 가 가려짐. max 를 2.0 으로 낮춰 engagement 양극화
  # 증폭을 줄이고 micro/mid 기여가 살아나도록 조정. Post 수 비례성은 그대로 유지.
  influencer_weights:
    mega: 2.0      # 팔로워 ≥ 1_000_000
    macro: 1.5     # 100_000 ≤ 팔로워 < 1_000_000
    mid: 1.2       # 10_000 ≤ 팔로워 < 100_000
    micro: 1.0     # 팔로워 < 10_000
  influencer_tier_thresholds:
    mega: 1000000
    macro: 100000
    mid: 10000

  # M3.E — ig_source_type 별 Social multiplier. haul > hashtag > bollywood > profile.
  # Social weighted_engagement = engagement_raw × influencer_weight × source_type_weight.
  source_type_weights:
    influencer_fixed: 1.0      # profile baseline
    hashtag_tracking: 1.2      # 트렌드 발견 가중
    hashtag_haul: 1.5          # 구매 검증 시그널 (가장 강함)
    bollywood_decode: 1.1      # seed (ver2 "Bollywood=seed / Haul=검증")

  # spec §9.2 YouTube — V × a + views × b + view_growth × c (minmax 는 orchestrator 가 수행).
  youtube_factor_weights:
    video_count: 0.3
    views: 0.4
    view_growth: 0.3

  # spec §9.2 Cultural — festival × 0.6 + bollywood × 0.4.
  cultural_factor_weights:
    festival: 0.6
    bollywood: 0.4
  cultural_festival_boost: 1.5
  cultural_bollywood_bonus: 0.3

  # spec §9.5 — Akshaya Tritiya. 데모 기간 ±2주 윈도우.
  cultural_festivals:
    - name: akshaya_tritiya
      window_start: 2026-04-13
      window_end: 2026-05-11
      tags:
        - "#akshayatritiya"
        - "#akshayatritiya2026"
        - "#goldethnic"

  # spec §9.2 Momentum — post_growth × 0.4 + hashtag_velocity × 0.3 +
  # new_ig_account_ratio × 0.15 + new_yt_channel_ratio × 0.15. B-2 (M3.G/H 후):
  # new_account_ratio 0.3 을 IG/YT 분리 시그널로 균등 분배. score_breakdown 의
  # momentum_components 에서 sub-signal 별 영향 추적 가능.
  momentum_factor_weights:
    post_growth: 0.4
    hashtag_velocity: 0.3
    new_ig_account_ratio: 0.15
    new_yt_channel_ratio: 0.15
  momentum_window_days: 7
  new_account_window_days: 90  # 이 기간 내 미등장 계정을 new로 간주

  # spec — data_maturity 판정 일수.
  data_maturity:
    bootstrap_below_days: 3     # <3 → bootstrap
    full_from_days: 7           # ≥7 → full (그 사이는 partial)

vlm:
  # spec §7 — 안전 기본값. 3-A 의 LLM 과 동일한 discipline.
  seed: 42
  temperature: 0
  # Case 2: 클러스터당 top-engagement 포스트 처리 cap. M3.G/H 이후 source 별 분리축.
  # YT 단가 ~4× (영상 1건 ≈ frame 20장 → Gemini 20회). YT 보수적 cap 으로 비용 상한 명시.
  case2_per_cluster_cap_ig: 5
  case2_per_cluster_cap_yt: 1
  # Case 1: 하루 전체 미분류 포스트 처리 cap (비용 가드, source 별 분리).
  case1_daily_cap_ig: 50
  case1_daily_cap_yt: 10
  # ζ (2026-04-28): Case 2 picking 의 share threshold.
  # trend_cluster_shares 의 share 가 이 값 미만이면 picking 후보 제외 (노이즈 차단).
  # G/T/F partial 분포 자연 lower bound (0.6×0.5×0.5=0.15 / 0.4×0.5×0.5=0.10) 대응.
  case2_picking_min_share: 0.10

# --------------------------------------------------------------------------- #
# Vision LLM (Phase 2) — GeminiVisionLLMClient + LocalJSONCache 설정.
# Phase 0 파일럿 (2026-04-23, 20 post A/B) 에서 gemini-2.5-flash 채택.
#   - BBOX 정확도 gpt-5-mini 대비 tighter (압승 판정)
#   - garment_type 약간 우위
#   - per-call 비용 $0.0009 vs $0.0026 (3배 저렴)
# 자세한 경위: memory project_phase0_gemini_adopted.md
# --------------------------------------------------------------------------- #
vision_llm:
  # provider: gemini | azure-openai. 향후 `--vision-llm` CLI 플래그로 swap.
  provider: gemini
  model_id: gemini-2.5-flash
  # 프롬프트 수정 시 반드시 bump — src/vision/prompts.py::PROMPT_VERSION 과 일치해야 함.
  # v0.8 (2026-04-28, M3.I styling_combo P1 파생): schema 슬롯 2개 추가 —
  # (1) outer_layer (단일 word: dupatta/shawl/jacket/cardigan/nehru/shrug 등 traditional
  #     drape 또는 outer 의류, 없으면 null), (2) is_co_ord_set (bool — upper+lower 가
  #     동일 fabric/print/색조로 의도적으로 매칭된 set 여부). 색 픽 규칙은 v0.7 그대로
  #     (color regression 방지). v0.7 cache 자동 무효화.
  prompt_version: v0.8
  # LocalJSONCache 저장 루트. outputs/ 하위 (gitignore 대상).
  cache_dir: outputs/llm_cache

# --------------------------------------------------------------------------- #
# Phase 4.5 — Intra-post outfit dedup (Pipeline B M3.A Step D).
# 같은 post 내 (IG carousel / 필터된 frames) 서로 다른 image 에서 LLM 이 뽑은 outfit
# 들을 similarity 가중합 ≥ threshold 면 canonical 1개로 병합. BBOX 집합 union 으로 묶어
# Phase 3 crop 입력에 전달. 우선순위 근거: memory project_phase0_gemini_adopted.md
#   color_preset → color_family → garment_type → technique
# silhouette / fabric 은 dedup 가중치 0 (참고용), 현재 schema 에는 등장 안 함.
# --------------------------------------------------------------------------- #
outfit_dedup:
  color_preset_weight: 0.40
  color_family_weight: 0.25
  garment_type_weight: 0.25
  technique_weight: 0.10
  threshold: 0.60
  # 같은 image 2-outfit 은 보통 다른 사람이라 merge 금지 — 안전 가드 기본 False.
  same_image_merge: false
  preset_path: outputs/color_preset/color_preset.json

palette:
  # Color 3층 재설계 (2026-04-24): post-level ColorInfo 폐기. top_k 는 B3 에서 cluster
  # palette merge (post_palette greedy merge, max 5) 로 재배선 예정. A2 기간 동안 이
  # 설정은 참고값으로만 유지, make_drilldown 이 빈 color_palette=[] 반환.
  top_k: 5

export:
  summaries_filename: summaries.json
  enriched_filename: enriched.json

# --------------------------------------------------------------------------- #
# Vision — Pipeline B (YOLOv8 + segformer + LAB KMeans) 색 추출 파라미터 (spec §4.1 ④)
# 출처: ~/dev/clothing-color-extraction-poc verdict.md (2026-04-17 동료 PoC).
# 동료 PoC 는 완결 아님 — 우리 레포에서 방법론 비교 계속하며 tune 할 지점:
#   - skin_lab_box.min[0] (L_min): 40 → 30 까지 내리면 deep skin tone leak 감소 여부 측정
#   - extract_colors.k: 5 → 3 / 7 비교 (대시보드 chip 수 vs 정확도 tradeoff)
#   - extract_colors.min_pixels: class 별 최소 pixel. 낮추면 noise, 높이면 small garment drop
# --------------------------------------------------------------------------- #
vision:
  # 2026-04-23 `scripts/collect_skin_lab.py` — 200 post (hashtag 100 + profile 100) 의 유효
  # 120 post, 5.2M skin pixel 기반 percentile 실측. Box C (L p5-p95 / a,b p2.5-p97.5).
  # 이전 [40,10,15]→[80,25,35] 는 deep skin / 음영 skin 을 놓치던 상태 — 확장.
  # L 하단 5%tile=16.1 이하는 segformer mis-seg 가능성 커서 제외.
  #
  # 2026-04-23 재조정: L 상한 79.8 → 72.0 으로 하향.
  # 사유: 밝은 옷 (특히 거의 흰색) 의 음영 pixel (L 72~80) 이 LAB 상 skin box 안으로 들어와
  # 옷색이 drop 되는 관찰. 72.0 ≈ L p85 근사 (mean 53.39 + 1.04*std 18.85) — fair skin
  # 얼굴 (L 80+) 은 어차피 face class mask 로 잡혀 garment 추출 대상 밖이라 영향 제한적.
  skin_lab_box:
    min: [16.1, 0.0, -2.6]
    max: [72.0, 29.6, 43.7]
  extract_colors:
    k: 5
    min_pixels: 150
  # Phase 4 동적 k palette (roadmap §80). canonical outfit pool → k=5 KMeans →
  # ΔE76 greedy merge → share drop. 최종 k ∈ {0..5} (단/2/3/4/5색 옷 자연 대응).
  dynamic_palette:
    initial_k: 5
    merge_deltae76_threshold: 10.0   # 지각상 가까운 pair greedy merge 기준
    min_cluster_share: 0.05          # share < 5% 는 noise 로 drop
    min_pixels: 150                  # pool 이 이보다 작으면 KMeans 의미 없음 → []
  # Phase 1+3 per-object β-hybrid + canonical 통합 weighted KMeans 임계 묶음.
  # default 는 vision/hybrid_palette.py 모듈 상수와 일치 (drift 방지 pinning 테스트).
  # 튜닝 시 scripts/diag_canonical_pool.py + smoke 영향 비교 권장.
  hybrid_palette:
    pick_match_deltae76: 28.0        # R3 / R1 매칭 ΔE76 (Gemini pick ↔ pixel cluster)
    r2_min_share: 0.10               # R2 vivid/highlight solo 최소 share
    chroma_vivid: 15.0               # vivid solo 분류 chroma 임계
    hue_near_deg: 30.0               # 같은 hue 그룹 병합 각
    r2_merge_deltae76: 40.0          # R2 non-anchor → anchor 머지 ΔE76 한계
    chroma_ratio_min: 0.5            # _is_bright_highlight chroma 비율 가드
    top_n: 3                         # canonical 통합 palette 최대 cluster 수
  # post-level palette aggregation (canonical → post). default 는
  # vision/post_palette.py 모듈 상수와 일치 (drift 방지 pinning).
  post_palette:
    max_clusters: 3                  # post-level palette 최대 cluster
    merge_deltae76_threshold: 10.0   # area_ratio × within-share 가중 ΔE76 merge
    min_cluster_share: 0.05          # share < 5% 는 drop
  # 거울 셀카 등 YOLOv8n 이 못 잡는 mirror/occlusion 케이스 방어. true 면 YOLO 0 bbox 일 때
  # 전체 이미지를 segformer 에 태워 의류/피부/배경 분리로 진행.
  fallback_full_image_on_no_person: true
  # drop_skin_adaptive 의 하/상 임계. 3단 분기:
  # - ratio > upper_ceiling (0.97): segment 통째 drop. 팔/다리가 upper-clothes/pants 로 mis-seg
  #   된 케이스 (segment 가 순수 skin) 방어. box C 기준 진짜 베이지 kurta 도 97%+ 찍기 어려움.
  # - ratio > threshold (0.5): skin-tone 옷 판정, 전체 보존 (베이지 kurta 보호).
  # - 그 이하: edge noise (목/손목 leak) 로 box 안 pixel 만 drop.
  skin_drop_threshold_pct: 0.5
  skin_drop_upper_ceiling: 0.97
  # spatial-aware drop. segformer skin class mask 를 N px dilate 한 "skin 인접 zone" 과
  # LAB-box-안 pixel 의 교집합 만 drop. 옷 내부 패턴(쉬폰/베이지 자수/흰옷 음영) 보존,
  # 목/손목 경계 leak 만 제거. 0 이면 비활성 (pixel-list 분기와 동일). crop scale 이 보통
  # 짧은 변 ~512 이라 4 px margin 기본. 음영이 계속 날아가면 2 로 내려 margin 좁힘.
  skin_dilate_iterations: 4
  # phase 3 — (frame × person × garment_class) instance 기반 palette 설정.
  instance:
    single_color_max_delta_e: 8.0   # instance 내 chip 간 ΔE 미만이면 단색 판정
    duplicate_max_delta_e: 15.0     # instance 간 top-1 ΔE 미만이면 같은 옷
    weight_formula: log             # log(1+count) | linear | sqrt
  # M3.A Step D Phase 1 (2026-04-24 재설계) — CLIP zero-shot 2-stage pre-filter.
  # enabled: false 이면 NoopSceneFilter — 모든 frame pass. true 면 CLIP ViT-B/32 로드.
  # Stage 1 (image-level): scene + woman/adult softmax threshold 판정. argmax 완화.
  # Stage 2 (per-BBOX): man/child mix signal 감지 시만 YOLO BBOX 별 CLIP 재판정.
  scene_filter:
    enabled: true
    model_id: openai/clip-vit-base-patch32
    scene_prompts:
      - a fashion photo of a person wearing clothing
      - a photo of a statue or mannequin
      - a photo of a landscape or outdoor scenery
    scene_pass_index: 0
    gender_prompts:
      - a photo of a woman
      - a photo of a man
    female_index: 0
    male_index: 1
    age_prompts:
      - a photo of a young child
      - a photo of a teenager or adult
    child_index: 0
    adult_index: 1
    # scene pass prompt softmax (argmax 조건 X). 0.20 = fashion 신호가 20% 이상만 있으면 살림.
    scene_min_pass_score: 0.20
    # Stage 1 argmax 완화 (Phase 1): 여성이 있어도 남성 비중이 더 크면 argmax 가 man 쪽이라
    # 기존 기준은 drop. softmax threshold 로 바꿔 여성 30% / 성인 30% 이상만 있으면 pass.
    stage1_female_min: 0.30
    stage1_adult_min: 0.30
    # Stage 2 trigger: man 또는 child signal 이 이 값 이상이면 per-BBOX CLIP 재판정.
    stage2_mix_threshold: 0.30
    # Stage 2 BBOX 단일 인물 판정 — stage1 보다 높게 (BBOX 당 1명 전제).
    stage2_female_min: 0.50
    stage2_adult_min: 0.50
    stage2_enabled: true
    # Stage 2 BBOX crop 짧은 변 최소 (CLIP embedding noise 방어). 80px 미만 → too_small drop.
    min_person_bbox_side_px: 80

  # bbox-level 오탐 필터. 동상/마네킹/옷 없는 제품샷에서 의류 추출 방지.
  # - min_skin_ratio_for_person: crop 내 segformer skin class pixel 비율 최소값.
  #   미만이면 drop (동상=skin 없음). 0.005 = 0.5%.
  # - max_garment_ratio_for_person: crop 내 의류 pixel 비율 최대값.
  #   초과하면 drop (배경 오분류 또는 전체 의류 flat shot).
  min_skin_ratio_for_person: 0.005
  max_garment_ratio_for_person: 0.90

  # M3.G — IG Reel / IG carousel video / YT 영상 frame sampling.
  # 영상 1건 당 n_candidate 균등 sampling → quality score (Laplacian + brightness gate)
  # → scene diversity NMS (HSV H+S corr) → top n_final 만 Pipeline B 통과.
  # 길이 무관 cost 일정: decode 50 × ~10ms ≈ 500ms / 영상.
  video_frame:
    n_candidate: 50
    n_final: 20
    blur_min: 100.0           # Laplacian variance < 100 = motion blur drop
    brightness_range: [30.0, 225.0]  # 30 미만 under / 225 초과 over exposure drop
    # 같은 장면 best frame 중복 차단 (HSV H+S corr ≥ 0.85 = 같은 장면).
    # 0.85 = 강한 컷 차단 + 같은 의상 다른 각도는 통과 (fashion 영상 typical).
    scene_corr_max: 0.85
    histogram_bins: 32
